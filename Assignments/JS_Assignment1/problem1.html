<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Design Example</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: lightblue;
            font-size: 18px;
        }

        header {
            background-color: navy;
            color: white;
            text-align: center;
            padding: 15px;
        }

        nav {
            background-color: #333;
            display: flex;
            justify-content: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            display: block;
        }

        nav a:hover {
            background-color: #555;
        }

        section {
            padding: 20px;
            text-align: center;
        }

        @media screen and (max-width: 768px) {
            
            body {
                background-color: lightcoral;
            }

            body {
                font-size: 14px;
            }

            nav {
                flex-direction: column;
                align-items: center;
            }

            nav a {
                width: 100%;
                text-align: center;
                border-bottom: 1px solid white;
            }
        }

    </style>
</head>
<body>

    <header>
        <h1>Responsive Web Design</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <section>
        <h2>Welcome!</h2>
        <p>This webpage adjusts layout and style based on screen size.</p>
    </section>
    </body>
</html>

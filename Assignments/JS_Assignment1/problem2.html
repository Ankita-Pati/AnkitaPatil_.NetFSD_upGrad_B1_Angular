<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>  
    <h2>Student Grade Evaluator</h2>
    <script>
        let marks = 72;

        if (marks >= 75) {
            console.log("Grade A");
            document.write("Marks:" + marks + "<br>Grade: A");
        }
        else if (marks >= 60) {
            console.log("Grade B");
            document.write("Marks:" + marks + "<br>Grade: B");
        }
        else if (marks >= 40) {
            console.log("Grade C");
            document.write("Marks:" + marks + "<br>Grade: C");
        }
        else {
            console.log("Fail");
            document.write("Marks:" + marks + "<br>Result: Fail");
        }

    </script>
</body>
</html>

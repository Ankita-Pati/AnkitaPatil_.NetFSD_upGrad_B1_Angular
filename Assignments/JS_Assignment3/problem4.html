<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Mini Expense Tracker</title>
</head>
<body onload="initDB()">

<h2>💰 Mini Expense Tracker</h2>

Title: <input type="text" id="title"><br><br>
Amount: <input type="number" id="amount"><br><br>
Date: <input type="date" id="date"><br><br>

<button onclick="addExpense()">Add Expense</button>
<button onclick="viewExpenses()">View Expenses</button>

<h3>Expense List</h3>
<ul id="expenseList"></ul>

<p id="message"></p>

<script>

let db;

function initDB() {

    db = openDatabase("ExpenseDB", "1.0", "Expense Database", 2 * 1024 * 1024);

    if (!db) {
        document.getElementById("message").innerHTML = "❌ Database not supported.";
        return;
    }

    db.transaction(function(tx) {

        tx.executeSql(
            "CREATE TABLE IF NOT EXISTS expenses (id INTEGER PRIMARY KEY AUTOINCREMENT, title TEXT, amount REAL, date TEXT)",
            [],
            function() {
                console.log("Table created successfully");
            },
            function(tx, error) {
                document.getElementById("message").innerHTML =
                "❌ Table creation error: " + error.message;
            }
        );

    });
}

function addExpense() {

    let title = document.getElementById("title").value;
    let amount = document.getElementById("amount").value;
    let date = document.getElementById("date").value;

    db.transaction(function(tx) {

        tx.executeSql(
            "INSERT INTO expenses (title, amount, date) VALUES (?, ?, ?)",
            [title, amount, date],
            function() {
                document.getElementById("message").innerHTML = "✅ Expense Added!";
                viewExpenses();
            },
            function(tx, error) {
                document.getElementById("message").innerHTML =
                "❌ Insert error: " + error.message;
            }
        );

    }, function(error) {
        document.getElementById("message").innerHTML =
        "❌ Transaction error: " + error.message;
    });
}

function viewExpenses() {

    db.transaction(function(tx) {

        tx.executeSql(
            "SELECT * FROM expenses",
            [],
            function(tx, results) {

                let list = document.getElementById("expenseList");
                list.innerHTML = "";

                for (let i = 0; i < results.rows.length; i++) {

                    let row = results.rows.item(i);

                    let li = document.createElement("li");
                    li.innerHTML =
                        row.title + " - ₹" + row.amount + " - " + row.date +
                        " <button onclick='deleteExpense(" + row.id + ")'>Delete</button>";

                    list.appendChild(li);
                }
            },
            function(tx, error) {
                document.getElementById("message").innerHTML =
                "❌ Select error: " + error.message;
            }
        );

    });
}

function deleteExpense(id) {

    db.transaction(function(tx) {

        tx.executeSql(
            "DELETE FROM expenses WHERE id = ?",
            [id],
            function() {
                document.getElementById("message").innerHTML = "🗑️ Expense Deleted!";
                viewExpenses();
            },
            function(tx, error) {
                document.getElementById("message").innerHTML =
                "❌ Delete error: " + error.message;
            }
        );

    }, function(error) {
        document.getElementById("message").innerHTML =
        "❌ Transaction error: " + error.message;
    });
}

</script>   
</body>
</html>

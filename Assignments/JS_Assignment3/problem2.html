<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Form Validation</title>
</head>
<body>
    <h2>📋 Registration Form</h2>
    Name:
    <input type="text" id="name" onchange="validateName()">
    <span id="nameMsg"></span>
    <br><br>

    Email:
    <input type="text" id="email" onchange="validateEmail()">
    <span id="emailMsg"></span>
    <br><br>

    Age:
    <input type="number" id="age" onchange="validateAge()">
    <span id="ageMsg"></span>
    <br><br>

    <button onclick="submitForm()">Register</button>

    <p id="finalMsg"></p>

    <script>

        function validateName() {
            let name = document.getElementById("name").value;
            if (name.trim() === "") {
                document.getElementById("nameMsg").innerHTML = "❌ Name cannot be empty";
            } else {
                document.getElementById("nameMsg").innerHTML = "✅ Valid Name";
            }
        }

        function validateEmail() {
            let email = document.getElementById("email").value;
            if (email.includes("@")) {
                document.getElementById("emailMsg").innerHTML = "✅ Valid Email";
            } else {
                document.getElementById("emailMsg").innerHTML = "❌ Email must contain @";
            }
        }

        function validateAge() {
            let age = document.getElementById("age").value;
            if (age > 18) {
                document.getElementById("ageMsg").innerHTML = "✅ Age is valid";
            } else {
                document.getElementById("ageMsg").innerHTML = "❌ Age must be greater than 18";
            }
        }

        function submitForm() {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let age = document.getElementById("age").value;

            if (name.trim() !== "" && email.includes("@") && age > 18) {

                sessionStorage.setItem("userName", name);
                sessionStorage.setItem("userEmail", email);
                sessionStorage.setItem("userAge", age);

                document.getElementById("finalMsg").innerHTML = "🎉 Registration Successful! Data stored in sessionStorage.";
            } else {
                document.getElementById("finalMsg").innerHTML = "⚠️ Please correct the errors before submitting.";
            }
        }

    </script>
</body>
</html>
